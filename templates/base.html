{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'pigly/favicon.png' %}">

    <!-- Theme init (before paint) -->
    <script>
        (function() {
            try {
                var t = localStorage.getItem('pigly_theme') || 'light';
                if (t === 'dark') document.documentElement.classList.add('dark');
            } catch(e) {}
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        };
    </script>

    {% block head %}{% endblock %}
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
        /* ===================== BASE ===================== */
        html, body {
            min-height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #FAFAF8;
            color: #111827;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dark body {
            background-color: #0C0C0C;
            color: #F0F0F0;
        }

        /* Dot-grid background layer */
        .dot-grid::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .dark .dot-grid::before {
            background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
        }

        /* ============== SCROLL ANIMATIONS ============== */
        .anim {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.75s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.75s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .anim.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .d1 { transition-delay: 0.08s; }
        .d2 { transition-delay: 0.16s; }
        .d3 { transition-delay: 0.24s; }
        .d4 { transition-delay: 0.32s; }
        .d5 { transition-delay: 0.40s; }
        .d6 { transition-delay: 0.48s; }

        /* ================ NAV BLUR ================ */
        .nav-blur {
            backdrop-filter: saturate(180%) blur(18px);
            -webkit-backdrop-filter: saturate(180%) blur(18px);
        }

        /* ================ CARD HOVER ================ */
        .card-lift {
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.35s ease;
        }
        .card-lift:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 48px rgba(0,0,0,0.08);
        }
        .dark .card-lift:hover {
            box-shadow: 0 24px 48px rgba(0,0,0,0.35);
        }

        /* =============== GLASS CARD =============== */
        .glass-card {
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
            background: rgba(22, 22, 22, 0.75);
            border-color: rgba(255, 255, 255, 0.07);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }

        /* =============== FLOATING PILL =============== */
        .floating-pill {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
        }
        .dark .floating-pill {
            background: rgba(22, 22, 22, 0.88);
            border-color: rgba(255, 255, 255, 0.07);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* ================ BUTTONS ================ */
        .btn-amber {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.75rem;
            background: #E8A838;
            color: #fff;
            font-weight: 600;
            border-radius: 0.85rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(232, 168, 56, 0.3);
        }
        .btn-amber:hover {
            background: #D49B2F;
            box-shadow: 0 8px 24px rgba(232, 168, 56, 0.4);
            transform: translateY(-1px);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.75rem;
            background: transparent;
            color: #374151;
            font-weight: 600;
            border-radius: 0.85rem;
            border: 1px solid #D1D5DB;
            transition: all 0.25s ease;
        }
        .btn-outline:hover {
            border-color: #9CA3AF;
            color: #111827;
            transform: translateY(-1px);
        }
        .dark .btn-outline {
            color: #E5E7EB;
            border-color: #374151;
        }
        .dark .btn-outline:hover {
            border-color: #6B7280;
            color: #F9FAFB;
        }

        /* ================ SCROLLBAR ================ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

        /* ================ UTILITY ================ */
        [x-cloak] { display: none !important; }

        .text-gradient {
            background: linear-gradient(135deg, #E8A838, #D97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="h-full">
    <div class="min-h-screen">
        {% if messages %}
            <div class="fixed right-4 top-4 z-50 space-y-3">
                {% for message in messages %}
                    <div class="max-w-sm rounded-2xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-700 shadow-lg dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
